{% extends "base.html" %}

{% block title %}
Edit Car
{% endblock %}

{% block content %}

<section class="add-car-section">

    <div class="add-car-card">

        <div class="page-header">

            <h1>Edit Car</h1>

            <p>Update your vehicle information.</p>

        </div>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="submit-car-btn">

                Update Car

            </button>

        </form>

    </div>

</section>

{% endblock %}
