{% extends "base.html" %}

{% block content %}

<div class="payment-container">

    <h1>Complete Payment</h1>

    <h2>₹{{ payment.amount }}</h2>
    <div class="payment-summary">

    <p>
        Booking Amount:
        <strong>₹{{ payment.amount }}</strong>
    </p>

    <p>
        Wallet Balance:
        <strong>₹{{ wallet_balance }}</strong>
    </p>

    <p>
        Remaining Amount:
        <strong>
            ₹{{ remaining_amount }}
        </strong>
    </p>

</div>


<button id="pay-btn" class="pay-btn">
    Pay ₹{{ remaining_amount }}
</button>
<form method="POST" action="{% url 'wallet_payment'  booking.id %}">

    {% csrf_token %}

    <button class="wallet-pay-btn">

        💰 Pay Using Wallet

    </button>

</form>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

var options = {

    key: "{{ razorpay_key }}",

    amount: "{{ amount_paise }}",

    currency: "INR",

    name: "DriveShare",

    description: "Car Rental Payment",

    order_id: "{{ order_id }}",

    handler: function (response) {

        var form = document.createElement("form");

        form.method = "POST";

        form.action = "{% url 'payment_success'  booking.id %}";

        var csrf = document.createElement("input");

        csrf.type = "hidden";

        csrf.name = "csrfmiddlewaretoken";

        csrf.value = "{{ csrf_token }}";

        form.appendChild(csrf);

        var payment_id = document.createElement("input");

        payment_id.type = "hidden";

        payment_id.name = "razorpay_payment_id";

        payment_id.value = response.razorpay_payment_id;

        form.appendChild(payment_id);

        var order_id = document.createElement("input");

        order_id.type = "hidden";

        order_id.name = "razorpay_order_id";

        order_id.value = response.razorpay_order_id;

        form.appendChild(order_id);

        var signature = document.createElement("input");

        signature.type = "hidden";

        signature.name = "razorpay_signature";

        signature.value = response.razorpay_signature;

        form.appendChild(signature);

        document.body.appendChild(form);

        form.submit();

    },   // <-- comma added here

    modal: {

        ondismiss: function () {

            window.location.href =
            "{% url 'payment_failed'  booking.id %}";

        }

    },

    theme: {

        color: "#2563eb"

    }

};

var rzp = new Razorpay(options);

document.getElementById("pay-btn").onclick = function(e){

    rzp.open();

    e.preventDefault();

};

</script>
{% endblock %}
